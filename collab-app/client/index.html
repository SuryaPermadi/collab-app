<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CollabSpace — Real-time Collaboration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080A0F;
      --bgCard: #111520;
      --bgPanel: #0F1420;
      --bgInput: #080A0F;
      --border: #1E2433;
      --borderHover: #2E3550;
      --text: #E8EBF2;
      --textMuted: #5A6380;
      --textDim: #3A4255;
      --accent: #00E5C3;
      --accentPurple: #7B61FF;
      --danger: #FF4D6D;
      --warning: #FFB347;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }

    /* Scrollbar theme */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--borderHover);
    }

    /* Input & select global */
    input,
    textarea,
    select {
      color-scheme: dark;
    }

    /* TipTap editor styles */
    .ProseMirror {
      outline: none;
    }

    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      float: left;
      color: var(--textMuted);
      pointer-events: none;
      height: 0;
    }

    .ProseMirror h1 {
      font-size: 2em;
      font-weight: 800;
      margin: 24px 0 12px;
      color: var(--text);
    }

    .ProseMirror h2 {
      font-size: 1.5em;
      font-weight: 700;
      margin: 20px 0 10px;
      color: var(--text);
    }

    .ProseMirror h3 {
      font-size: 1.2em;
      font-weight: 600;
      margin: 16px 0 8px;
      color: var(--text);
    }

    .ProseMirror p {
      margin-bottom: 8px;
      color: var(--text);
    }

    .ProseMirror ul,
    .ProseMirror ol {
      padding-left: 24px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .ProseMirror li {
      margin-bottom: 4px;
    }

    .ProseMirror code {
      background: var(--bgPanel);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
    }

    .ProseMirror pre {
      background: var(--bgPanel);
      border: 1px solid var(--border);
      padding: 16px;
      margin: 12px 0;
      overflow-x: auto;
    }

    .ProseMirror pre code {
      background: none;
      padding: 0;
      color: var(--text);
    }

    .ProseMirror blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      color: var(--textMuted);
      margin: 12px 0;
    }

    .ProseMirror ul[data-type="taskList"] {
      list-style: none;
      padding-left: 0;
    }

    .ProseMirror li[data-type="taskItem"] {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .ProseMirror li[data-type="taskItem"]>label {
      margin-top: 2px;
    }

    mark {
      background: rgba(0, 229, 195, 0.2);
      color: var(--accent);
      padding: 0 2px;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
