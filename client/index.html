<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CollabSpace — Real-time Collaboration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #080A0F; }
    /* TipTap editor styles */
    .ProseMirror { outline: none; }
    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      float: left; color: #5A6380; pointer-events: none; height: 0;
    }
    .ProseMirror h1 { font-size: 2em; font-weight: 800; margin: 24px 0 12px; color: #E8EBF2; }
    .ProseMirror h2 { font-size: 1.5em; font-weight: 700; margin: 20px 0 10px; color: #E8EBF2; }
    .ProseMirror h3 { font-size: 1.2em; font-weight: 600; margin: 16px 0 8px; color: #E8EBF2; }
    .ProseMirror p { margin-bottom: 8px; color: #C8CBD6; }
    .ProseMirror ul, .ProseMirror ol { padding-left: 24px; margin-bottom: 8px; color: #C8CBD6; }
    .ProseMirror li { margin-bottom: 4px; }
    .ProseMirror code { background: #1E2433; color: #00E5C3; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
    .ProseMirror pre { background: #0F1420; border: 1px solid #1E2433; padding: 16px; margin: 12px 0; overflow-x: auto; }
    .ProseMirror pre code { background: none; padding: 0; color: #E8EBF2; }
    .ProseMirror blockquote { border-left: 3px solid #00E5C3; padding-left: 16px; color: #5A6380; margin: 12px 0; }
    .ProseMirror ul[data-type="taskList"] { list-style: none; padding-left: 0; }
    .ProseMirror li[data-type="taskItem"] { display: flex; gap: 8px; align-items: flex-start; }
    .ProseMirror li[data-type="taskItem"] > label { margin-top: 2px; }
    mark { background: rgba(0,229,195,0.2); color: #00E5C3; padding: 0 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
